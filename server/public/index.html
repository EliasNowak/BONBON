<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VisionClaw - Kitchen View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2c1e16; color: #fff3e6; font-family: 'Georgia','Times New Roman',serif;
      height: 100vh; overflow: hidden;
    }
    #video-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a110d;
      touch-action: none;
      padding: 16px;
    }
    /* Fallback single video (used when no local camera) */
    #fallback-video {
      width: 100%;
      height: auto;
      max-height: 100vh;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 16px;
    }
    /* PiP layout */
    #pip-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #1a110d; display: none;
    }
    #main-video {
      width: 100%;
      height: auto;
      max-height: 100vh;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 16px;
    }
    #pip-video {
      position: absolute;
      top: 16px; right: 16px;
      width: 240px; height: 135px;
      object-fit: cover;
      border-radius: 12px;
      border: 2px solid rgba(255,140,0,0.5);
      cursor: pointer;
      z-index: 5;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
      background: #2c1e16;
    }
    @media (max-width: 900px) {
      #pip-video {
        width: 160px; height: 90px;
        top: 12px; right: 12px;
      }
    }
    #controls {
      position: absolute; top: 20px; right: 20px;
      display: flex; gap: 10px; z-index: 10;
    }
    input {
      padding: 16px 20px; font-size: 24px; border-radius: 16px;
      border: 2px solid #5d4037; background: #3e2723; color: #fff3e6;
      text-transform: uppercase; letter-spacing: 8px; width: 200px;
      text-align: center; font-family: 'SF Mono','Menlo',monospace;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.3);
    }
    input::placeholder {
      letter-spacing: 3px; font-size: 16px; color: #8d6e63;
    }
    button {
      padding: 12px 22px; font-size: 15px; border-radius: 14px;
      border: none; cursor: pointer; font-weight: 700;
      transition: transform 0.15s, box-shadow 0.15s;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(0,0,0,0.4); }
    button:active { transform: translateY(0); box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
    #disconnect-btn { background: #bf360c; color: #fff; display: none; }
    #mic-btn { background: #4e342e; color: #fff3e6; display: none; }
    #cam-btn { background: #4e342e; color: #fff3e6; display: none; }
    #cam-btn.muted { background: #bf360c; color: #fff; }
    #status {
      position: absolute; top: 20px; left: 20px;
      padding: 8px 18px; border-radius: 20px; font-size: 15px;
      font-weight: 700; z-index: 10; letter-spacing: 0.5px;
      backdrop-filter: blur(4px);
    }
    .status-waiting { background: rgba(255,167,38,0.25); color: #ffcc80; border: 1px solid rgba(255,167,38,0.4); }
    .status-connected { background: rgba(102,187,106,0.25); color: #a5d6a7; border: 1px solid rgba(102,187,106,0.4); }
    .status-disconnected { background: rgba(239,83,80,0.25); color: #ef9a9a; border: 1px solid rgba(239,83,80,0.4); }
    .status-idle { background: rgba(255,255,255,0.08); color: #a1887f; border: 1px solid rgba(255,255,255,0.12); }
    #join-panel {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      text-align: center; z-index: 10;
      background: rgba(44,30,22,0.85);
      padding: 48px 56px;
      border-radius: 28px;
      border: 1px solid rgba(255,140,0,0.2);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      max-width: 90vw;
    }
    #join-panel h1 {
      font-size: 38px; font-weight: 700; margin-bottom: 10px;
      color: #ffab40; letter-spacing: 1px;
    }
    #join-panel .tagline {
      font-size: 16px; color: #bcaaa4; margin-bottom: 8px;
      font-style: italic;
    }
    #join-panel p {
      color: #a1887f; margin-bottom: 28px; font-size: 16px;
    }
    .join-row {
      display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
    }
    #waiting-msg {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      text-align: center; display: none; z-index: 10;
      background: rgba(44,30,22,0.8);
      padding: 28px 40px;
      border-radius: 24px;
      border: 1px solid rgba(255,140,0,0.2);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    #waiting-msg p { color: #d7ccc8; font-size: 18px; }
    /* === HUD Overlay Styles (CookClaw companion) === */
    #hud-overlay {
      position: absolute;
      top: 16px; left: 16px; right: 16px;
      pointer-events: none;
      z-index: 15;
      display: flex;
      justify-content: center;
    }
    @media (min-width: 900px) {
      #hud-overlay {
        justify-content: flex-start;
      }
    }
    .hud-card {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 14px 18px;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: auto;
    }
    .hud-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 13px;
      color: #9ca3af;
      letter-spacing: 0.3px;
    }
    .hud-header .hud-icon { font-size: 14px; }
    .hud-progress { font-size: 12px; color: #9ca3af; margin-bottom: 8px; }
    .hud-step {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 6px;
      color: #f3f4f6;
    }
    .hud-body {
      font-size: 13px;
      color: #c4c8ce;
      line-height: 1.4;
      margin-bottom: 6px;
    }
    .hud-timer {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: #fff;
      margin-bottom: 4px;
      font-variant-numeric: tabular-nums;
    }
    .hud-timer .paused { color: #fca5a5; }
    .hud-timer .finished { color: #a7f3d0; }
    .hud-warnings { margin-top: 4px; }
    .hud-warning {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 8px;
      margin-bottom: 4px;
      color: #fff;
      background: rgba(239,68,68,0.25);
      border: 1px solid rgba(239,68,68,0.4);
    }
    .hud-warning.safety { background: rgba(239,68,68,0.25); border-color: rgba(239,68,68,0.4); }
    .hud-warning.quality { background: rgba(245,158,11,0.25); border-color: rgba(245,158,11,0.4); }
    .hud-warning.missingItem { background: rgba(59,130,246,0.25); border-color: rgba(59,130,246,0.4); }
    .hud-warning.uncertainty { background: rgba(139,92,246,0.25); border-color: rgba(139,92,246,0.4); }
    .hud-controls {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .hud-btn {
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      pointer-events: auto;
    }
    .hud-btn.primary { background: #e65100; color: #fff; }
    .hud-btn.secondary { background: rgba(255,255,255,0.15); color: #fff3e6; }

    /* Decorative subtle radial glow behind join panel */
    #video-container::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 600px; height: 600px;
      transform: translate(-50%,-50%);
      background: radial-gradient(circle, rgba(230,81,0,0.08) 0%, transparent 70%);
      pointer-events: none; z-index: 1;
    }
  </style>
</head>
<body>
  <div id="video-container">
    <!-- Fallback: single video for audio-only (no local camera) -->
    <video id="fallback-video" autoplay playsinline></video>

    <!-- PiP layout: two videos -->
    <div id="pip-container">
      <video id="main-video" autoplay playsinline></video>
      <video id="pip-video" autoplay playsinline muted onclick="swapVideos()"></video>
    </div>

    <div id="status" class="status-idle">Not Connected</div>

    <div id="join-panel">
      <h1>VisionClaw</h1>
      <p class="tagline">Your eyes in the kitchen</p>
      <p>Waiting for stream... Keep this page open.</p>
    </div>

    <div id="waiting-msg">
      <p>Connected. Waiting for stream...</p>
    </div>

    <!-- === HUD Overlay: simulates the glasses cooking cards === -->
    <div id="hud-overlay" style="display:none;">
      <div class="hud-card" id="hud-card">
        <div class="hud-header" id="hud-header">
          <span class="hud-icon" id="hud-icon">🍴</span>
          <span class="hud-recipe" id="hud-recipe">CookClaw</span>
        </div>
        <div class="hud-progress" id="hud-progress"></div>
        
        <!-- Step progress bar -->
        <div class="step-progress" id="step-progress"></div>
        
        <div class="hud-step" id="hud-step">Ready to cook?</div>
        <div class="hud-body" id="hud-body"></div>
        <div class="hud-timer" id="hud-timer"></div>
        <div class="hud-warnings" id="hud-warnings"></div>
        <div class="hud-controls" id="hud-controls"></div>
        
        <!-- Interactive Step List -->
        <div class="step-list" id="step-list"></div>
      </div>
    </div>

    <div id="controls">
      <button id="cam-btn" onclick="toggleCam()">Cam: ON</button>
      <button id="mic-btn" onclick="toggleMic()">Mic: ON</button>
      <button id="disconnect-btn" onclick="disconnectSession()">Disconnect</button>
    </div>
  </div>

  <script>
    console.log('[VisionClaw] Script loaded');

    let ws, pc, localStream;
    let localVideoStream = null;
    let pendingCandidates = [];
    let isSwapped = false;
    let remoteStream = null;
    const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${wsProtocol}//${location.host}`;
    console.log('[VisionClaw] WebSocket URL:', wsUrl);

    // Auto-join immediately
    autoJoin();

    function autoJoin() {
      console.log('[VisionClaw] autoJoin called');
      cleanup();
      console.log('[VisionClaw] cleanup done, creating WebSocket...');
      ws = new WebSocket(wsUrl);
      ws.onopen = () => {
        console.log('[VisionClaw] WebSocket OPEN, sending join');
        ws.send(JSON.stringify({ type: 'join' }));
        setStatus('Waiting for stream...', 'waiting');
      };
      ws.onmessage = (e) => {
        console.log('[VisionClaw] Received:', e.data);
        handleSignaling(JSON.parse(e.data));
      };
      ws.onclose = (e) => {
        console.log('[VisionClaw] WebSocket CLOSED', e.code, e.reason);
        setStatus('Disconnected', 'disconnected');
        showControls(false);
        // Auto-reconnect after 1s
        setTimeout(() => {
          console.log('[VisionClaw] Auto-reconnecting...');
          autoJoin();
        }, 1000);
      };
      ws.onerror = (e) => {
        console.log('[VisionClaw] WebSocket ERROR', e);
        setStatus('Connection error', 'disconnected');
      };
    }

    async function handleSignaling(msg) {
      switch (msg.type) {
        case 'room_joined':
          setStatus('Waiting for stream...', 'waiting');
          document.getElementById('join-panel').style.display = 'none';
          document.getElementById('waiting-msg').style.display = 'block';
          break;

        case 'offer':
          document.getElementById('waiting-msg').style.display = 'none';
          pendingCandidates = [];
          await setupPeerConnection();
          await pc.setRemoteDescription({ type: 'offer', sdp: msg.sdp });
          // Flush any candidates that arrived during setup
          for (const c of pendingCandidates) {
            await pc.addIceCandidate(c);
          }
          console.log('Flushed', pendingCandidates.length, 'buffered candidates');
          pendingCandidates = [];
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          ws.send(JSON.stringify({ type: 'answer', sdp: answer.sdp }));
          break;

        case 'candidate': {
          const candidate = {
            candidate: msg.candidate,
            sdpMid: msg.sdpMid,
            sdpMLineIndex: msg.sdpMLineIndex
          };
          if (pc && pc.remoteDescription) {
            await pc.addIceCandidate(candidate);
          } else {
            pendingCandidates.push(candidate);
          }
          break;
        }

        case 'overlay':
          updateHUD(msg);
          break;

        case 'peer_left':
          if (pc) { pc.close(); pc = null; }
          resetVideoElements();
          // Don't go back to join screen -- the iOS app may be backgrounded
          // and will rejoin within the grace period. Stay in the room.
          setStatus('Waiting for reconnect...', 'waiting');
          document.getElementById('waiting-msg').style.display = 'block';
          document.getElementById('waiting-msg').querySelector('p').textContent =
            'Stream paused. Waiting for glasses to reconnect...';
          showControls(false);
          break;

        case 'error':
          setStatus(msg.message, 'disconnected');
          document.getElementById('join-panel').style.display = 'block';
          break;
      }
    }

    async function setupPeerConnection() {
      // Close any existing peer connection
      if (pc) { pc.close(); pc = null; }

      // Fetch TURN credentials for NAT traversal across networks
      let iceServers = [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
      ];
      try {
        const resp = await fetch('/api/turn');
        const creds = await resp.json();
        if (creds && creds.urls) {
          iceServers.push({
            urls: creds.urls,
            username: creds.username,
            credential: creds.credential
          });
          console.log('TURN credentials loaded:', JSON.stringify(creds.urls));
        } else if (creds && creds.iceServers) {
          for (const s of creds.iceServers) {
            iceServers.push({ urls: s.urls, username: s.username, credential: s.credential });
          }
          // Log each TURN server with credential info for debugging
          for (const s of creds.iceServers) {
            const urls = Array.isArray(s.urls) ? s.urls : [s.urls];
            console.log('TURN server:', urls[0], '| user:', s.username?.substring(0, 8) + '...', '| cred length:', s.credential?.length);
          }
          console.log('TURN credentials loaded:', creds.iceServers.length, 'servers');
        } else {
          console.log('TURN response format unexpected:', JSON.stringify(creds));
        }
      } catch (e) {
        console.log('No TURN credentials, STUN only:', e.message);
      }
      const config = { iceServers, iceCandidatePoolSize: 2 };
      console.log('ICE servers config:', JSON.stringify(iceServers.map(s => s.urls)));
      pc = new RTCPeerConnection(config);

      // Get mic AND camera for bidirectional audio+video
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          audio: true,
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
        });
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        localVideoStream = localStream;
        console.log('Camera + mic access granted');
      } catch (e) {
        // Fallback: try audio-only if camera denied
        console.log('Camera denied, trying audio-only:', e.message);
        localVideoStream = null;
        try {
          localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        } catch (e2) {
          console.log('No mic or camera access');
          localStream = null;
        }
      }

      pc.ontrack = (e) => {
        if (e.streams && e.streams[0]) {
          remoteStream = e.streams[0];
          // Don't show PiP yet -- wait for ICE "connected" to ensure media is flowing
        }
      };

      let candidateCounts = { host: 0, srflx: 0, relay: 0 };
      pc.onicecandidate = (e) => {
        if (e.candidate) {
          const c = e.candidate.candidate;
          if (c.includes('relay')) { candidateCounts.relay++; console.log('ICE candidate: RELAY (TURN)', c); }
          else if (c.includes('srflx')) { candidateCounts.srflx++; console.log('ICE candidate: STUN (srflx)', c); }
          else if (c.includes('host')) { candidateCounts.host++; }
          ws.send(JSON.stringify({
            type: 'candidate',
            candidate: e.candidate.candidate,
            sdpMid: e.candidate.sdpMid,
            sdpMLineIndex: e.candidate.sdpMLineIndex
          }));
        } else {
          console.log('ICE gathering complete. Candidates:', JSON.stringify(candidateCounts));
          if (candidateCounts.relay === 0 && candidateCounts.srflx === 0) {
            console.warn('WARNING: No STUN or TURN candidates. TURN credentials may be invalid or network is very restrictive.');
          }
        }
      };

      pc.onicegatheringstatechange = () => {
        console.log('ICE gathering state:', pc.iceGatheringState);
      };

      pc.oniceconnectionstatechange = () => {
        console.log('ICE connection state:', pc.iceConnectionState);
        switch (pc.iceConnectionState) {
          case 'connected':
          case 'completed':
            setStatus('Live', 'connected');
            showControls(true);
            if (remoteStream) showVideoLayout();
            break;
          case 'disconnected':
            setStatus('Reconnecting...', 'waiting');
            break;
          case 'failed':
            setStatus('Connection failed', 'disconnected');
            break;
          case 'closed':
            setStatus('Disconnected', 'disconnected');
            showControls(false);
            break;
        }
      };
    }

    // Show the appropriate video layout based on whether we have a local camera
    function showVideoLayout() {
      if (localVideoStream && remoteStream) {
        // PiP mode: both cameras available
        document.getElementById('fallback-video').style.display = 'none';
        document.getElementById('pip-container').style.display = 'block';

        const mainVideo = document.getElementById('main-video');
        const pipVideo = document.getElementById('pip-video');

        // Default: main = remote (iOS glasses), pip = local (browser camera, mirrored)
        mainVideo.srcObject = remoteStream;
        mainVideo.muted = false;
        pipVideo.srcObject = localVideoStream;
        pipVideo.muted = true;
        pipVideo.style.transform = 'scaleX(-1)';
        isSwapped = false;
      } else if (remoteStream) {
        // No local camera: fallback to single video
        document.getElementById('pip-container').style.display = 'none';
        document.getElementById('fallback-video').style.display = 'block';
        document.getElementById('fallback-video').srcObject = remoteStream;
      }
    }

    function swapVideos() {
      const mainVideo = document.getElementById('main-video');
      const pipVideo = document.getElementById('pip-video');

      if (isSwapped) {
        // Swap back to default: main = remote, pip = local
        mainVideo.srcObject = remoteStream;
        mainVideo.muted = false;
        mainVideo.style.transform = '';
        pipVideo.srcObject = localVideoStream;
        pipVideo.muted = true;
        pipVideo.style.transform = 'scaleX(-1)';
      } else {
        // Swap: main = local (mirrored), pip = remote
        mainVideo.srcObject = localVideoStream;
        mainVideo.muted = true;
        mainVideo.style.transform = 'scaleX(-1)';
        pipVideo.srcObject = remoteStream;
        pipVideo.muted = false;
        pipVideo.style.transform = '';
      }
      isSwapped = !isSwapped;
    }

    function toggleMic() {
      if (!localStream) return;
      const track = localStream.getAudioTracks()[0];
      if (!track) return;
      track.enabled = !track.enabled;
      const btn = document.getElementById('mic-btn');
      btn.textContent = track.enabled ? 'Mic: ON' : 'Mic: OFF';
      btn.classList.toggle('muted', !track.enabled);
    }

    function toggleCam() {
      if (!localVideoStream) return;
      const track = localVideoStream.getVideoTracks()[0];
      if (!track) return;
      track.enabled = !track.enabled;
      const btn = document.getElementById('cam-btn');
      btn.textContent = track.enabled ? 'Cam: ON' : 'Cam: OFF';
      btn.classList.toggle('muted', !track.enabled);
    }

    function resetVideoElements() {
      document.getElementById('fallback-video').srcObject = null;
      document.getElementById('main-video').srcObject = null;
      document.getElementById('pip-video').srcObject = null;
      document.getElementById('pip-container').style.display = 'none';
      document.getElementById('fallback-video').style.display = 'block';
      remoteStream = null;
      isSwapped = false;
    }

    function cleanup() {
      if (pc) { pc.close(); pc = null; }
      if (ws) { ws.close(); ws = null; }
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
        localVideoStream = null;
      }
      resetVideoElements();
    }

    function disconnectSession() {
      cleanup();
      setStatus('Disconnected', 'disconnected');
      showControls(false);
      document.getElementById('join-panel').style.display = 'block';
    }

    function showControls(visible) {
      document.getElementById('mic-btn').style.display = visible ? 'inline-block' : 'none';
      document.getElementById('cam-btn').style.display = (visible && localVideoStream) ? 'inline-block' : 'none';
      document.getElementById('disconnect-btn').style.display = visible ? 'inline-block' : 'none';
    }

    function setStatus(text, cls) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = 'status-' + cls;
    }

    // ============ HUD Overlay ============
    function updateHUD(msg) {
      const overlay = document.getElementById('hud-overlay');
      if (!overlay) return;

      // Show overlay once we receive any data
      overlay.style.display = 'flex';

      const data = msg;
      const recipeTitle = data.recipeTitle || 'CookClaw';
      const step = data.stepInstruction || '';
      const visualCue = data.visualCue || '';
      const targetTemperature = data.targetTemperature || '';
      const progress = data.progressText || '';
      const isComplete = !!data.isComplete;
      const isPaused = !!data.isPaused;

      document.getElementById('hud-recipe').textContent = recipeTitle;
      document.getElementById('hud-icon').textContent = isComplete ? '✅' : recipeTitle ? '🍴' : '👋';
      document.getElementById('hud-progress').textContent = progress;

      const stepEl = document.getElementById('hud-step');
      if (isComplete) {
        stepEl.textContent = 'All done! Enjoy your meal. 🎉';
        stepEl.style.color = '#a7f3d0';
      } else if (step) {
        stepEl.textContent = step;
        stepEl.style.color = '#f3f4f6';
      } else {
        stepEl.textContent = 'Ready to cook?';
        stepEl.style.color = '#f3f4f6';
      }

      // Body detail
      let bodyParts = [];
      if (visualCue) bodyParts.push('Look for: ' + visualCue);
      if (targetTemperature) bodyParts.push('Heat: ' + targetTemperature);
      document.getElementById('hud-body').innerHTML = bodyParts.map(b => `<div>${escapeHtml(b)}</div>`).join('');

      // Timers
      let timersHtml = '';
      if (data.activeTimers && data.activeTimers.length > 0) {
        timersHtml = data.activeTimers.map(t => {
          let statusClass = '';
          if (t.isFinished) statusClass = 'finished';
          else if (t.isPaused) statusClass = 'paused';
          const mm = Math.floor(t.remainingSeconds / 60).toString().padStart(2, '0');
          const ss = (t.remainingSeconds % 60).toString().padStart(2, '0');
          return `<div class="hud-timer ${statusClass}">⏱️ ${escapeHtml(t.name)}: ${mm}:${ss}</div>`;
        }).join('');
      }
      document.getElementById('hud-timer').innerHTML = timersHtml;

      // Warnings
      let warningsHtml = '';
      if (data.warnings && data.warnings.length > 0) {
        warningsHtml = data.warnings.map(w => {
          const cls = w.type || 'uncertainty';
          return `<div class="hud-warning ${cls}">⚠️ ${escapeHtml(w.message)}</div>`;
        }).join('');
      }
      document.getElementById('hud-warnings').innerHTML = warningsHtml;

      // Controls
      let controlsHtml = '';
      if (isPaused || isComplete) {
        controlsHtml = '<div class="hud-controls">';
        if (isPaused) controlsHtml += '<button class="hud-btn primary">▶️ Resume</button>';
        if (isComplete) controlsHtml += '<button class="hud-btn secondary">➕ New Recipe</button>';
        controlsHtml += '</div>';
      }
      document.getElementById('hud-controls').innerHTML = controlsHtml;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
